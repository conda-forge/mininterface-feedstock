schema_version: 1

context:
  name: mininterface
  version: "1.4.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/mininterface-${{ version }}.tar.gz
  sha256: 0ed57f57e45974211c8a4c82fe857e3fdc04152715ee5f7d42cb24f1e2fb3758

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - mininterface = mininterface.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=2.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - simple-term-menu
    - annotated-types
    # Include basic requirements (listed as optional upstream)
    - tyro >=1.0.14,<1.0.15
    - pyyaml
    - humanize
    - textual >=2.0.0,<9.0.0
    - tkinter-tooltip
    - tkinter_form ==0.2.1
    - tkscrollableframe

tests:
  - python:
      imports:
        - mininterface
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - mininterface --help

about:
  homepage: https://github.com/CZ-NIC/mininterface
  summary: "CLI & dialog toolkit – a minimal interface to Python application (GUI, TUI, CLI + config files, web)"
  license: LGPL-3.0-only
  license_file: LICENSE
  documentation: https://cz-nic.github.io/mininterface/Overview/

extra:
  recipe-maintainers:
    - thewchan
